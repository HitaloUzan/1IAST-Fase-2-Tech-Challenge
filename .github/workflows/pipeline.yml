name: Pipeline Alfabetização — Bronze → Streaming → Silver → Gold

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Bronze Ingestion
        run: python ingestion/batch/ingest_bronze.py

      - name: Streaming Simulation
        run: |
          python streaming/consumer.py --max-mensagens 20 --timeout 60 &
          CONSUMER_PID=$!
          sleep 3
          python streaming/producer.py --eventos 20 --intervalo 1.0
          wait $CONSUMER_PID

      - name: Silver Transforms
        run: python silver/transform_silver.py

      - name: Gold Build
        run: python gold/build_gold.py

      - name: Quality Validation
        run: python quality/validate.py
